<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGMA — Your Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --black: #0a0a0a;
    --red: #ff2020;
    --dim-red: #7a0f0f;
    --white: #f0ece4;
    --grey: #2a2a2a;
    --mid: #555;
    --accent: #ffb800;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* SCANLINE overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--grey);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    color: var(--red);
  }

  .status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--red);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .blink {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 780px;
    margin: 0 auto;
    width: 100%;
    padding: 32px 24px 0;
  }

  /* CONTEXT PANEL */
  .context-panel {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .ctx-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--grey);
    background: transparent;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
  }

  .ctx-btn:hover, .ctx-btn.active {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255,32,32,0.06);
  }

  /* CHAT */
  .chat-window {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
    padding-bottom: 16px;
    min-height: 320px;
    max-height: 55vh;
  }

  .chat-window::-webkit-scrollbar { width: 3px; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--dim-red); }

  .msg {
    padding: 18px 0;
    border-bottom: 1px solid #161616;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .msg-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .msg.agent .msg-label { color: var(--red); }
  .msg.user .msg-label { color: var(--mid); }

  .msg-body {
    font-size: 0.95rem;
    line-height: 1.65;
    font-weight: 300;
  }

  .msg.agent .msg-body {
    color: var(--white);
  }

  .msg.user .msg-body {
    color: #888;
  }

  /* BRUTAL HIGHLIGHT */
  .highlight {
    color: var(--accent);
    font-weight: 500;
  }

  .red-text { color: var(--red); font-weight: 500; }

  /* INPUT AREA */
  .input-area {
    border-top: 1px solid var(--grey);
    padding: 20px 0 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .quick-prompts {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .qp {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.5px;
    padding: 5px 10px;
    border: 1px solid #222;
    background: #111;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
  }

  .qp:hover {
    border-color: #444;
    color: var(--white);
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  textarea {
    flex: 1;
    background: #111;
    border: 1px solid var(--grey);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 12px 16px;
    resize: none;
    outline: none;
    line-height: 1.5;
    transition: border-color 0.2s;
    min-height: 52px;
    max-height: 120px;
  }

  textarea:focus { border-color: var(--red); }
  textarea::placeholder { color: #333; }

  #send-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    background: var(--red);
    color: var(--black);
    border: none;
    padding: 0 22px;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  #send-btn:hover { background: #ff4444; }
  #send-btn:disabled { background: var(--dim-red); cursor: not-allowed; }

  /* LOADING */
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid #161616;
  }

  .typing .msg-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--red); margin-right: 10px; }

  .dot {
    width: 5px; height: 5px;
    background: var(--red);
    border-radius: 50%;
    animation: bounce 0.9s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce { 0%, 100% { opacity: 0.2; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-4px); } }

  /* QUOTE BAR */
  .quote-bar {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 3px;
    color: var(--dim-red);
    text-align: center;
    padding: 12px 0 4px;
    animation: quoteSlide 0.6s ease;
  }

  @keyframes quoteSlide { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<header>
  <div class="logo">SIGMA</div>
  <div class="status"><div class="blink"></div> ACTIVE — NO MERCY MODE</div>
</header>

<div class="main">
  <div class="context-panel">
    <button class="ctx-btn active" data-ctx="default">General</button>
    <button class="ctx-btn" data-ctx="portfolio">Portfolio</button>
    <button class="ctx-btn" data-ctx="thesis">Thesis</button>
    <button class="ctx-btn" data-ctx="apps">Grad Apps</button>
    <button class="ctx-btn" data-ctx="procrastinating">I'm Procrastinating</button>
  </div>

  <div class="chat-window" id="chat"></div>

  <div class="input-area">
    <div class="quote-bar" id="quote-bar">DISCIPLINE IS CHOOSING BETWEEN WHAT YOU WANT NOW AND WHAT YOU WANT MOST</div>
    <div class="quick-prompts">
      <button class="qp" data-q="I don't feel like working today.">don't feel like it</button>
      <button class="qp" data-q="Tell me exactly what I should do right now.">what do i do now</button>
      <button class="qp" data-q="I've been procrastinating for 2 hours.">been procrastinating</button>
      <button class="qp" data-q="Am I on track for my goals?">am i on track</button>
      <button class="qp" data-q="Roast me.">roast me</button>
    </div>
    <div class="input-row">
      <textarea id="input" placeholder="Talk to SIGMA..." rows="2"></textarea>
      <button id="send-btn">SEND</button>
    </div>
  </div>
</div>

<script>
const API_URL = "https://api.anthropic.com/v1/messages";

const QUOTES = [
  "DISCIPLINE IS CHOOSING BETWEEN WHAT YOU WANT NOW AND WHAT YOU WANT MOST",
  "THE PERSON YOU'LL BE IN 5 YEARS IS BUILT BY THE CHOICES YOU MAKE TODAY",
  "SUFFERING IS OPTIONAL. MEDIOCRITY IS A CHOICE.",
  "PENN AND COLUMBIA DON'T ACCEPT EXCUSES. NEITHER DO I.",
  "YOUR COMPETITION IS WORKING RIGHT NOW.",
  "COMFORT IS THE ENEMY OF ACHIEVEMENT",
  "NO ONE IS COMING TO SAVE YOU. ONLY YOU CAN DO THIS.",
  "THE PORTFOLIO WON'T BUILD ITSELF.",
  "EVERY HOUR WASTED IS A DOOR CLOSING.",
];

const CONTEXTS = {
  default: `You are SIGMA — a brutally honest, zero-tolerance AI accountability agent. Your user is A, an urban designer and architect working toward graduate school applications to Penn MSD Urban Design and Columbia MSAUD, and a sponsored role at firms like Arup, SOM, Gensler, AECOM, or BIG. Her focus is urban systems, urban tech, and meaningful change. She is building a portfolio with three key projects: (1) Urban Hybrid thesis at Mahalaxmi Mumbai, (2) Swargate multimodal transport hub, (3) Sem 5 Sports Hybrid. She is based in Mumbai/Pune.

Your job: be direct, harsh, and motivating. Call out excuses. Give concrete, specific next actions. Never coddle. Reference her real goals when relevant. Use short, punchy sentences. Be the coach she can't afford to hire. Don't be mean-spirited — be relentlessly focused on her success. Push her toward the work.`,

  portfolio: `You are SIGMA — a brutally honest AI accountability agent specialized in portfolio strategy. A is an urban designer applying to Penn MSD Urban Design and Columbia MSAUD. Her portfolio has 3 projects: (1) Urban Hybrid Thesis at Mahalaxmi Mumbai — the lead project, needs void diagram, vertical adjacencies section, Grasshopper work; (2) Swargate multimodal transport hub — TOD and urban mapping focus; (3) Sem 5 Sports Hybrid — showcases parametric/Grasshopper skills. Goa hotel and residential long block are cut. Every portfolio decision must be evaluated against Penn/Columbia admission and sponsored employment at top firms. Be brutal, specific, and direct. No comfort. Push her to the work.`,

  thesis: `You are SIGMA — a brutally honest AI accountability agent. A's thesis is Urban Hybrid at Mahalaxmi, Mumbai — it must be framed as an urban systems intervention. Key deliverables: void diagram, vertical adjacencies section, Grasshopper parametric work. This is her LEAD project — it must be exceptional. Be ruthlessly specific about what she needs to do. Call out any vagueness. Push her toward concrete output.`,

  apps: `You are SIGMA — a brutally honest AI accountability agent focused on graduate school applications. A is targeting Penn MSD Urban Design and Columbia MSAUD as her primary programs, plus sponsored roles at Arup, SOM, Gensler, AECOM, McKinsey Cities, BIG. Be brutal about deadlines, statement of purpose quality, and portfolio presentation. Every decision must be filtered through: does this get her into Penn or Columbia, or into a sponsored role at a top firm? Be direct and unsparing.`,

  procrastinating: `You are SIGMA — a brutally honest AI accountability agent. A has just confessed she's been procrastinating. Do not be gentle. Call it out. Remind her what's at stake: Penn MSD, Columbia MSAUD, sponsored roles at top firms, her thesis, her portfolio. Give her a concrete 3-step action plan for the next 30 minutes. Be relentless. No excuses. Make her feel the urgency.`
};

let currentContext = 'default';
let history = [];
let isLoading = false;

function setQuote() {
  const el = document.getElementById('quote-bar');
  el.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
}

function appendMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-label">${role === 'agent' ? '▸ SIGMA' : '▸ YOU'}</div>
    <div class="msg-body">${formatText(text)}</div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function formatText(text) {
  // Bold **word** → highlighted
  return text
    .replace(/\*\*(.+?)\*\*/g, '<span class="highlight">$1</span>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-label">▸ SIGMA</div><div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage(userText) {
  if (!userText.trim() || isLoading) return;
  isLoading = true;

  appendMsg('user', userText);
  history.push({ role: 'user', content: userText });

  document.getElementById('send-btn').disabled = true;
  document.getElementById('input').value = '';
  showTyping();
  setQuote();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: CONTEXTS[currentContext],
        messages: history
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || "Error. Try again.";
    hideTyping();
    appendMsg('agent', reply);
    history.push({ role: 'assistant', content: reply });

  } catch (e) {
    hideTyping();
    appendMsg('agent', "Connection failed. But that's not an excuse to stop working.");
  }

  document.getElementById('send-btn').disabled = false;
  isLoading = false;
}

// INIT message
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    const intro = `Let's be clear about something.\n\nYou opened me because part of you knows you're not doing enough. **That part is right.**\n\nYou have a thesis to finish, a portfolio to build, and applications to Penn and Columbia that won't write themselves. The firms you're targeting — Arup, SOM, BIG — they're not waiting for you to feel motivated. **They're hiring people who don't need to feel motivated.**\n\nSo. What are you supposed to be doing right now — and why aren't you doing it?`;
    appendMsg('agent', intro);
    history.push({ role: 'assistant', content: intro });
  }, 400);
});

// Context switcher
document.querySelectorAll('.ctx-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ctx-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentContext = btn.dataset.ctx;
    history = [];
    document.getElementById('chat').innerHTML = '';

    setTimeout(() => {
      const msg = `Context switched to **${btn.textContent.trim()}**. History cleared. Start fresh. What's the problem?`;
      appendMsg('agent', msg);
      history.push({ role: 'assistant', content: msg });
    }, 200);
  });
});

// Quick prompts
document.querySelectorAll('.qp').forEach(btn => {
  btn.addEventListener('click', () => {
    sendMessage(btn.dataset.q);
  });
});

// Send button
document.getElementById('send-btn').addEventListener('click', () => {
  sendMessage(document.getElementById('input').value);
});

// Enter to send
document.getElementById('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(e.target.value);
  }
});

// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
